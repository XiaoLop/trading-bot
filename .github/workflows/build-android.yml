name: 📱 构建 Android APK

on:
  # 手动触发
  workflow_dispatch:
  # 推送到 main 分支时自动触发
  push:
    branches: [ main, master ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    # 1. 检出代码
    - name: 📥 检出代码
      uses: actions/checkout@v4

    # 2. 设置 Python
    - name: 🐍 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    # 3. 安装系统依赖
    - name: 📦 安装系统依赖
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          automake \
          build-essential

    # 4. 安装 Python 依赖
    - name: 🐍 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        pip install buildozer==1.5.0
        pip install cython==0.29.36

    # 5. 构建 APK
    - name: 🔨 构建 APK
      run: |
        echo "🚀 开始构建 Android APK..."
        echo "预计需要 30-60 分钟，请耐心等待..."
        buildozer android debug
        echo "✅ 构建完成！"

    # 6. 查找 APK 文件
    - name: 🔍 查找 APK 文件
      run: |
        echo "📱 查找生成的 APK 文件..."
        find . -name "*.apk" -type f
        ls -lh bin/ 2>/dev/null || echo "bin 目录不存在"

    # 7. 上传 APK 到 Artifact
    - name: 📤 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: TradingBot-APK
        path: bin/*.apk
        retention-days: 30

    # 8. 构建报告
    - name: 📊 构建报告
      run: |
        echo "📱 APK 构建完成！"
        echo "请在 Actions 页面的 Artifacts 中下载 APK 文件。"

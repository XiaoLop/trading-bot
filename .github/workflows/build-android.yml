name: 📱 Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk python3-pip python3-dev \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev automake build-essential \
            libgl1-mesa-dev libgles2-mesa-dev libglew-dev libsdl2-dev \
            libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
            libswscale-dev libavformat-dev libavcodec-dev libfreetype6-dev \
            libpng-dev libjpeg-dev libffi-dev

      - name: 🐍 Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: 📱 Build APK with Buildozer
        run: |
          echo "🚀 Starting APK build..."
          echo "This will take 30-60 minutes for the first build."
          buildozer android debug
          echo "✅ Build finished!"

      - name: 🔍 Locate APK
        run: |
          echo "Searching for APK files..."
          find . -name "*.apk" -type f
          ls -la bin/ 2>/dev/null || echo "bin/ directory not found"

      - name: 📤 Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TradingBot-APK
          path: bin/*.apk
          retention-days: 30

      - name: 📊 Build report
        if: always()
        run: |
          echo "=== Build Summary ==="
          find . -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null || echo "No APK found"

name: 📱 Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk python3-pip python3-dev \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev automake build-essential \
            libgl1-mesa-dev libgles2-mesa-dev libglew-dev libsdl2-dev \
            libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
            libswscale-dev libavformat-dev libavcodec-dev libfreetype6-dev \
            libpng-dev libjpeg-dev libffi-dev

      - name: ☕ Setup Java
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))" >> $GITHUB_ENV
          echo "ANDROID_HOME=$HOME/.android" >> $GITHUB_ENV

      - name: 🐍 Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: ♻️ Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec', 'requirements_mobile.txt') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: 📝 Prepare Android entry point
        run: |
          # 备份原始 main.py
          [ -f main.py ] && cp main.py main.py.backup
          # 使用 mobile_trading_bot.py 作为入口
          cp mobile_trading_bot.py main.py
          # 验证 buildozer.spec 存在
          if [ ! -f buildozer.spec ]; then
            echo "❌ buildozer.spec not found!"
            exit 1
          fi
          # 确认入口文件配置
          grep -q "source.main = main.py" buildozer.spec || \
            sed -i 's/^source.main = .*/source.main = main.py/' buildozer.spec

      - name: 📱 Build APK with Buildozer
        run: |
          echo "🚀 Starting APK build..."
          echo "This will take 30-60 minutes for the first build."
          buildozer android debug 2>&1 | tee buildozer.log
          echo "✅ Build finished!"

      - name: 🔍 Locate and verify APK
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f -exec ls -lh {} \;
          echo "=== bin/ directory contents ==="
          ls -la bin/ 2>/dev/null || echo "bin/ directory not found"

      - name: 📤 Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TradingBot-APK-${{ github.run_number }}
          path: bin/*.apk
          retention-days: 30

      - name: 📊 Build report
        if: always()
        run: |
          echo "=== Build Summary ==="
          find . -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null || echo "No APK found"
          if [ -f buildozer.log ]; then
            echo "=== Last 50 lines of build log ==="
            tail -n 50 buildozer.log
          fi
